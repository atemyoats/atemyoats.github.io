<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>archive</title>
<style>
  body {
    background: white; /* white background */
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    text-align: center; /* center everything horizontally */
  }

  .container {
    padding: 50px 20px; /* space from top */
  }

  /* image styling */
  .center-image {
    max-width: 400px; /* adjust as needed */
    width: 80%;
    height: auto;
  }

  /* substack link styling */
  .substack-link {
    display: block; /* so it goes below the image */
    margin-top: 20px;
    font-size: 1.2rem;
    color: rgb(0, 43, 255);
    text-decoration: underline;
  }

  .substack-link:hover {
    opacity: 0.8;
  }
</style>
</head>
<body>

<div class="container">
  <!-- replace the src with your actual image URL -->
  <img src=https://raw.githubusercontent.com/atemyoats/atemyoats.github.io/main/challangah.png alt="archive image" class="center-image">

  <!-- substack link -->
  <a href="https://atemyoats.substack.com" target="_blank" class="substack-link">
    click here to see these two men kiss !!!!
  </a>
</div>

</body>
</html>
